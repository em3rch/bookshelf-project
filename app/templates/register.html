{% extends "base.html" %}

{% block title %}Signing up{% endblock %}

{% block content %}

    <h1>Register</h1>

    <form method="POST">
        <input name="username" placeholder="Username">
        <input name="email" placeholder="Email">
        <input name="password" type="password" placeholder="Password">

        <button type="submit">
            Submit 
        </button>
    </form>

{% endblock %}

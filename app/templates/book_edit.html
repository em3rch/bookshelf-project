{% extends "base.html" %}

{% block title %}Edit Book{% endblock %}

{% block content %}
    <h1>Edit Book</h1>

    <form method="POST" enctype="multipart/form-data">

        <label>Title</label><br>
        <input
            type="text"
            name="title"
            value="{{ book.title }}"
            required
        >
        <br><br>

        {% if book.cover_image %}
            <img
                src="{{ url_for('static', filename='uploads/covers/' + book.cover_image) }}"
                alt="{{ book.title }}"
                width="250"
            >
        {% elif book.cover_url %}
            <img
                src="{{ book.cover_url }}"
                alt="{{ book.title }}"
                width="250"
            >
        {% endif %}

        <label>Replace Cover</label><br>
        <input type="file" name="cover">
        <br><br>

        <label>Author</label><br>
        <input
            type="text"
            name="author"
            value="{{ book.author or '' }}"
        >
        <br><br>

        <label>Year</label><br>
        <input
            type="number"
            name="year"
            value="{{ book.year or '' }}"
        >
        <br><br>

        <label>Genres</label><br>
        <input
            type="text"
            name="genres"
            value="{{ book.genres or '' }}"
        >
        <br><br>

        <label>Description</label><br>
        <textarea name="description" rows="8">{{ book.description or '' }}</textarea>
        <br><br>

        <label>Status</label><br>
        <select name="status">
            <option value="wanted"
                {% if book.status == "wanted" %}selected{% endif %}>
                Want to Read
            </option>

            <option value="reading"
                {% if book.status == "reading" %}selected{% endif %}>
                Reading
            </option>

            <option value="read"
                {% if book.status == "read" %}selected{% endif %}>
                Read
            </option>
        </select>
        <br><br>

        <label>Personal Notes</label><br>
        <textarea name="notes" rows="8">{{ book.notes or '' }}</textarea>
        <br><br>

        <button type="submit">
            Save Changes
        </button>

    </form>

    <br>

    <a href="{{ url_for('books.book_details_handler', book_id=book.id) }}">
        Cancel
    </a>

{% endblock %}

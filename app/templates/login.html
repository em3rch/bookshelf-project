{% extends "base.html" %}

{% block title %}Logging in{% endblock %}

{% block content %}
    <h1>Login</h1>

    <form method="POST">
        <input name="username_or_email" placeholder="Username or email">
        <input name="password" type="password" placeholder="Password">

        <button type="submit">
            Login
        </button>
    </form>

{% endblock %}
